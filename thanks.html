<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06111f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      max-width: 600px;
      background: #10233c;
      padding: 40px 24px;
      border-radius: 24px;
    }
    .tick {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #d99a23;
      color: #06111f;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 52px;
      font-weight: bold;
    }
    h1 {
      font-size: 42px;
      margin: 10px 0;
    }
    p {
      font-size: 18px;
      color: #d5dbe5;
    }
    a {
      display: inline-block;
      margin-top: 24px;
      background: #d99a23;
      color: #06111f;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">✓</div>
    <p>South West England Representative Football</p>
    <h1>Thank You For Your Enquiry</h1>
    <p>Your enquiry has been sent.</p>
    <p>We will be in touch soon.</p>
    <a href="/">Back To Home Page</a>
  </div>
</body>
</html>
