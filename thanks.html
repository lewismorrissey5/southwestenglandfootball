<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enquiry Sent | South West England Representative Football</title>
  <meta name="description" content="Your enquiry has been sent to South West England Representative Football.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thank-you-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
      background:radial-gradient(circle at top, rgba(217,154,35,.24), transparent 36%), #06111f;
    }

    .thank-you-card{
      width:min(760px,100%);
      background:linear-gradient(180deg,#10233c,#09192d);
      border:1px solid rgba(255,255,255,.12);
      border-radius:32px;
      padding:54px 30px;
      text-align:center;
      box-shadow:0 28px 90px rgba(0,0,0,.35);
    }

    .tick{
      width:92px;
      height:92px;
      margin:0 auto 24px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#d99a23,#f7c45f);
      color:#06111f;
      font-size:58px;
      font-weight:900;
    }

    .thank-you-card h1{
      font-family:"Bebas Neue",Impact,sans-serif;
      font-size:clamp(48px,10vw,92px);
      text-transform:uppercase;
      margin:0 0 18px;
      line-height:.95;
    }

    .thank-you-card p{
      color:#d5dbe5;
      font-size:18px;
      max-width:560px;
      margin:12px auto;
    }

    .thank-you-card .button{
      margin-top:26px;
    }
  </style>
</head>
<body>

<main class="thank-you-page">
  <section class="thank-you-card">
    <div class="tick">✓</div>
    <p class="eyebrow">South West England Representative Football</p>
    <h1>Thank You For Your Enquiry</h1>
    <p>Your enquiry has been sent.</p>
    <p>We will be in touch soon.</p>
    <a href="index.html" class="button primary">Back To Home Page</a>
  </section>
</main>

</body>
</html>
